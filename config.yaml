  - ACSF1
  - CinCECGTorso
  - EOGHorizontalSignal
  - EOGVerticalSignal
  - EthanolLevel
  - HandOutlines
  - Haptics
  - HouseTwenty
  - InlineSkate
  - Mallat
  - MixedShapesRegularTrain
  - MixedShapesSmallTrain
  - Phoneme
  - PigAirwayPressure
  - PigArtPressure
  - PigCVP
  - Rock
  - SemgHandGenderCh2
  - SemgHandMovementCh2
  - SemgHandSubjectCh2
  - StarLightCurves

classifiers:
